# Alaska (Igiugig) Configuration - ENHANCED VERSION
# Location: Igiugig, Alaska, Kvichak River (59.32°N, -155.90°W)
# Environment: Riverine/lake system with Bristol Bay access
# Community: Village corporation of Igiugig (indigenous Yup'ik community)

site:
  name: "Igiugig, Alaska"
  coordinates: [59.32, -155.90]
  description: "Riverine/lake system with Bristol Bay access, indigenous Yup'ik community"
  environment_type: "riverine"
  water_depth: 15  # meters, typical river depth
  distance_to_shore: 0.5  # km, riverine location

# ENHANCED: API data sources configuration with hydro resource assessment
data_sources:
  weather:
    primary: "nasa_power"    # Historical weather data
    secondary: "openweather" # Current conditions and forecasts
    cache_duration: 24       # hours
    
  wind_resource:
    source: "nrel"
    hub_heights: [30, 50, 80]  # Lower heights for small community
    cache_duration: 168        # 1 week
    
  solar_resource:
    source: "nrel"
    tilt_angles: [55, 60, 65]  # High latitude optimized
    cache_duration: 168
    
  # ENHANCED: Hydro resource assessment for river-based systems
  hydro_resource:
    river_flow:
      source: "usgs_river_flow"  # US Geological Survey
      backup_source: "model_based"  # Custom flow model
      parameters:
        flow_measurement_station: "15302000"  # Kvichak River station
        historical_years: 10
        seasonal_analysis: true
      cache_duration: 720  # 30 days, river flow changes slower
    
    wave:
      source: "copernicus"
      applicable: false  # Riverine location, limited wave resource
      seasonal_access: "Bristol Bay (summer only)"
    
    tidal_range:
      applicable: false  # Minimal tidal range in riverine location
      reason: "Riverine location with minimal tidal variation"

# ENHANCED: User-configurable design variables with zones and tech mix selection
design_variables:
  # NEW: Tech mix selection approach
  tech_mix_known: true  # User specifies technologies, system optimizes capacities
  technology_selection: ["wind", "solar", "hydro_river_flow"]  # Selected technologies
  
  technology_mix:
    status: "known"  # Changed from "unknown"
    constraints:
      allowed_technologies: ["wind", "solar", "hydro_river_flow"]  # Updated with river flow
      min_technologies: 1
      max_technologies: 3  # Updated to allow all three
      environmental_restrictions:
        wind: "Minimize impact on bird migration routes and traditional hunting areas"
        solar: "Consider seasonal ice conditions and deployment type optimization"
        hydro_river_flow: "Ensure fish passage and minimal sediment impact"
      
  # ENHANCED: Location with exclusion/preferred zones
  location:
    status: "constrained"
    approach: "bounded_with_zones"  # Enhanced approach
    constraints:
      search_area:
        bounds: [[59.25, -156.0], [59.4, -155.8]]  # Around Igiugig
        depth_range: [5, 25]      # River depth constraints
        shore_distance_range: [0.1, 2.0]  # Very close to shore
      
      # NEW: Exclusion zones (high priority = complete exclusion)
      exclusion_zones:
        - name: "Traditional fishing areas"
          type: "cultural"
          priority: "high"  # Complete exclusion
          geometry: "polygon"
          coordinates: [[59.30, -155.95], [59.32, -155.93], [59.31, -155.91], [59.29, -155.93]]
        - name: "Salmon spawning grounds" 
          type: "ecological"
          priority: "high"  # Complete exclusion
          geometry: "circle"
          center: [59.33, -155.88]
          radius: 0.5  # km
        - name: "Village infrastructure"
          type: "infrastructure"
          priority: "medium"  # Cost penalty zone
          geometry: "circle"
          center: [59.32, -155.90]
          radius: 0.3
          cost_penalty: 1.3  # 30% cost increase
      
      # NEW: Preferred zones (bonus areas)
      preferred_zones:
        - name: "Strong current areas"
          type: "resource"
          bonus_factor: 1.2  # 20% performance bonus
          geometry: "polygon"
          coordinates: [[59.31, -155.92], [59.33, -155.90], [59.34, -155.88], [59.32, -155.89]]
        - name: "Shallow deployment areas"
          type: "accessibility"
          bonus_factor: 1.1  # 10% cost reduction
          geometry: "rectangle"
          bounds: [[59.30, -155.92], [59.34, -155.88]]
          
  capacity:
    status: "unknown"  # Optimize for community needs
    constraints:
      total_range: [0.1, 2.0]  # MW, small community scale
      individual_tech_limits:
        wind: [0.05, 1.0]      # Small wind turbines
        solar: [0.05, 1.5]     # Land or floating solar
        hydro_river_flow: [0.02, 0.5]  # River-based flow systems
      community_load: 0.5      # MW average community load

# ENHANCED: Technology specifications with hydro category and solar deployment options
technologies:
  wind:
    available: true
    environmental_impact: "medium"
    ecosystem_concerns:
      - "Bird migration disruption (minimal with proper siting)"
      - "Noise impact on wildlife and community"
      - "Visual impact on traditional landscape"
    cost_per_mw: 2500000      # USD, higher for remote location
    capacity_factor: 0.35     # Lower than coastal due to terrain
    technical_params:
      turbine_rating: 0.1     # MW, small community-scale turbines
      hub_height: 30          # meters
      rotor_diameter: 25      # meters
      availability: 0.95
      cold_weather_package: true
      
  solar:
    available: true
    environmental_impact: "low"
    ecosystem_concerns:
      - "Minimal wildlife impact with proper deployment"
      - "Ice conditions requiring robust mounting"
      - "Seasonal light variation (midnight sun/polar night)"
    cost_per_mw: 1800000      # USD, base cost (modified by deployment type)
    capacity_factor: 0.15     # Low due to high latitude (base for land deployment)
    floating_capacity_factor: 0.173  # 15% higher for floating (0.15 * 1.15)
    
    # NEW: Deployment options with automatic optimization
    deployment_options:
      land:
        available: true
        cost_multiplier: 0.8  # 20% cheaper than floating
        area_per_mw: 3000    # m² per MW (less than floating)
        maintenance_factor: 1.1  # 10% easier maintenance
        capacity_factor_modifier: 1.0  # Base capacity factor
        constraints:
          max_distance_from_shore: 2.0  # km
          suitable_terrain: "flat_permafrost"
      floating:
        available: true
        cost_multiplier: 1.0  # Base cost
        area_per_mw: 4000    # m² per MW (includes platform)
        maintenance_factor: 0.8  # 20% harder maintenance
        capacity_factor_modifier: 1.15  # 15% higher efficiency due to cooling
        additional_benefits:
          water_cooling_effect: 0.10  # 10% efficiency boost from cooling
          albedo_reflection: 0.05    # 5% boost from water reflection
          reduced_soiling: 0.02      # 2% boost from natural cleaning
        constraints:
          min_water_depth: 3.0  # meters
          ice_resistant: true
          seasonal_ice_impact: 0.95  # 5% reduction during ice season
      both:
        available: true
        optimization_strategy: "minimize_lcoe"  # Auto-choose based on economics
        performance_weighting: "capacity_factor"  # Consider performance in choice
    
    technical_params:
      panel_rating: 0.4       # kW per panel
      tilt_angle: 60          # degrees, optimized for latitude
      tracking: false         # Fixed mounting for durability
      ice_resistant: true
      
  # NEW: Hydro category with tidal current focus for rivers
  hydro:
    available: true
    environmental_impact: "medium"
    ecosystem_concerns:
      - "Fish passage must be maintained"
      - "Minimal sediment disturbance"
      - "Seasonal flow variation impact"
    
    # Tidal range not applicable for rivers
    tidal_range:
      available: false
      reason: "Minimal tidal range in riverine location"
    
    # PRIMARY: River flow using current velocity
    river_flow:
      available: true
      cost_per_mw: 3500000  # USD, higher cost for specialized equipment
      capacity_factor: 0.25  # Variable based on seasonal river flow
      resource_type: "river_flow"  # Direct river flow, not tidal
      seasonal_variation: true  # Account for spring melt, winter freeze
      
      technical_params:
        turbine_rating: 0.05  # MW, smaller units appropriate for rivers
        min_flow_velocity: 1.0  # m/s minimum for operation
        max_flow_velocity: 4.0  # m/s maximum safe operation
        deployment_depth_range: [3, 15]  # meters
        fish_friendly_design: true
        seasonal_deployment: true  # Can be removed during ice season
        
      environmental_constraints:
        fish_passage: "required"  # Must not block fish migration
        sediment_impact: "minimal"  # Low impact on river bed
        ice_season_removal: "optional"  # Can remove during winter
        
      constraints:
        river_locations_only: true
        seasonal_flow_variation: true
        requires_flow_measurement: true
    
    # Wave energy not applicable
    wave:
      available: false
      reason: "Riverine location with minimal wave resource"
      seasonal_access: "Bristol Bay (summer only)"

# Adaptive optimization based on unknown variables
optimization:
  adaptation_strategy:
    unknown_technology: "environmental_weighting"  # Prioritize low environmental impact
    unknown_location: "exclusion_filtering"        # Strict exclusion zone compliance
    unknown_capacity: "community_sizing"           # Size for community needs + growth
    
  objective: "minimize_lcoe"  # Primary objective for remote community
  secondary_objectives:
    - "minimize_environmental_impact"
    - "maximize_community_benefits"
    - "maximize_energy_security"
    
  constraints:
    max_investment: 5000000   # USD, community budget constraints
    min_capacity_factor: 0.20 # Overall system minimum
    max_total_capacity: 2.0   # MW, community scale limit
    environmental_thresholds:
      max_ecosystem_impact: "low"
      required_setbacks:
        cultural_sites: 0.5   # km
        ecological_zones: 0.3 # km
        residential_areas: 0.2 # km

# Community and stakeholder considerations
stakeholders:
  community_ownership: true   # Village corporation ownership model
  indigenous_rights: true     # Yup'ik traditional rights
  environmental_groups: true  # Alaska environmental concerns
  fishing_industry: true     # Subsistence and commercial fishing
  tourism_industry: false    # Limited tourism in area
  decision_criteria:
    economic_weight: 0.4      # Balanced approach
    environmental_weight: 0.3
    social_weight: 0.3        # High social consideration

# Uncertainty analysis parameters
uncertainty:
  monte_carlo_runs: 1000
  variables:
    weather: "stochastic"           # Weather variability
    electricity_price: "scenario_based"  # Remote community pricing
    capex: "normal_distribution"    # 20% std dev for remote construction
    opex: "normal_distribution"     # 15% std dev
    environmental_impact: "stakeholder_dependent"
    community_load_growth: "scenario_based"  # Population change scenarios

# Flexibility and real options
flexibility:
  decision_points: [3, 7, 12]     # years - re-evaluate system
  expansion_options: [0.1, 0.2, 0.5]  # MW increments
  abandonment_option: false      # Remote community needs energy security
  technology_switching: true     # Allow tech mix changes
  adaptive_deployment: true      # Phased deployment capability
  seasonal_operation: true       # Consider seasonal operation patterns

# Economic parameters
economic:
  discount_rate: 0.08            # Higher rate for remote/risky location
  project_lifetime: 25          # years
  electricity_price: 0.45       # $/kWh, high for remote Alaska
  inflation_rate: 0.03
  tax_rate: 0.0                 # Tax-exempt community corporation
  community_benefits_rate: 1.0  # 100% community ownership
  grant_funding_available: 0.7  # 70% potential grant funding

# Performance targets
targets:
  energy_security: 0.95         # 95% reliability target
  cost_reduction: 0.3           # 30% cost reduction vs diesel baseline
  environmental_impact: "minimal"
  community_satisfaction: "high"
